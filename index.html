<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key Login</title>

<style>
body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.box{
background:#111;
padding:30px;
border-radius:15px;
text-align:center;
border:3px solid orange;
box-shadow:0 0 20px orange;
width:260px;
animation: colorShift 5s infinite;
}

@keyframes colorShift{
0%{border-color:#00ffff; box-shadow:0 0 20px #00ffff;}
33%{border-color:#8000ff; box-shadow:0 0 20px #8000ff;}
66%{border-color:#ff7f00; box-shadow:0 0 20px #ff7f00;}
100%{border-color:#00ffff; box-shadow:0 0 20px #00ffff;}
}

.title{
color:white;
font-size:22px;
margin-bottom:15px;
}

input{
width:90%;
padding:10px;
border-radius:8px;
border:none;
background:#0b1f3a;
color:white;
font-size:16px;
margin-bottom:15px;
}

button{
background:#1e6cff;
border:none;
color:white;
padding:10px 25px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0f5ae0;
}

.success{
display:none;
background:#111;
padding:30px;
border-radius:15px;
text-align:center;
border:3px solid #00ff55;
box-shadow:0 0 20px #00ff55;
width:260px;
}

.circle{
width:40px;
height:40px;
border-radius:50%;
background:#00ff55;
color:black;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
margin:15px auto 0;
}

.dev{
margin-top:10px;
font-size:12px;
color:white;
opacity:0.35;
}

.shake{
animation:shake 0.4s;
border:3px solid red !important;
box-shadow:0 0 25px red !important;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-6px)}
50%{transform:translateX(6px)}
75%{transform:translateX(-6px)}
100%{transform:translateX(0)}
}
</style>
</head>

<body>

<div class="box" id="loginBox">

<div class="title">ادخل المفتاح</div>

<input type="password" id="key" placeholder="password">

<br>

<button onclick="login()">دخول</button>

<div class="dev">المطور عـــلـــي ¹</div>

</div>


<div class="success" id="successBox">

<div style="color:white;font-size:20px;">تم دخول بنجاح</div>

<div class="circle" id="count">3</div>

</div>


<script>

let correctKey = "1234";

function startCounter(){

let num = 3;

document.getElementById("count").innerText = num;

let interval = setInterval(function(){

num--;

document.getElementById("count").innerText = num;

if(num == 0){
clearInterval(interval);
}

},1000);

}


function login(){

let key = document.getElementById("key").value;

let box = document.getElementById("loginBox");


if(key === correctKey){

box.style.display="none";

document.getElementById("successBox").style.display="block";

startCounter();

}else{

box.classList.add("shake");

setTimeout(()=>{
box.classList.remove("shake");
},400);

}

}

</script>

</body>
</html>
